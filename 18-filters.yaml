- name: filters
  hosts: web
  become: yes
  tasks:
  - name: handle undefine variable
    ansible.builtin.debug:
      msg: "Hello from {{ person | default('sai') }}"
  
  - name: convert string to list
    vars:
      FRUITS: "goa, apple, banana"
    ansible.builtin.debug:
      msg: "fruits are: {{ FRUITS | split(',') }}"